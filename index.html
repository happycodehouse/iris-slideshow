<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="./resources/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./resources/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./resources/images/favicon/favicon-16x16.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xpressengine/xeicon@2.3.3/xeicon.min.css">
    <link rel="stylesheet" href="./resources/css/style.min.css">
    <title>lift-slideshow</title>
</head>
<body>
<div id="wrap" class="wrap">
    <header>
        <h1>Lift Slideshow</h1>
        <a href="https://github.com/happycodehouse/lift-slideshow" rel="noopener noreferrer" target="_blank">GitHub</a>
        <p>Content sourced from <a href="https://www.pixar.com/" rel="noopener noreferrer" target="_blank">www.pixar.com</a></p>
    </header>
    <div class="container">
        <div class="slideshow">
            <figure class="slide slide1 current">
                <div class="img_wrap">
                    <div class="img"></div>
                </div>
                <figcaption class="caption">
                    <div class="inner">
                        <h2>The Great Before</h2>
                        <a class="link" href="javascript:void(0)">Explore</a>
                    </div>
                </figcaption>
            </figure>
            <figure class="slide slide2">
                <div class="img_wrap">
                    <div class="img"></div>
                </div>
                <figcaption class="caption">
                    <div class="inner">
                        <h2>Personality Pavilions</h2>
                        <a class="link" href="javascript:void(0)">Explore</a>
                    </div>
                </figcaption>
            </figure>
            <figure class="slide slide3">
                <div class="img_wrap">
                    <div class="img"></div>
                </div>
                <figcaption class="caption">
                    <div class="inner">
                        <h2>The Hall of Everything</h2>
                        <a class="link" href="javascript:void(0)">Explore</a>
                    </div>
                </figcaption>
            </figure>
        </div>
        <div class="slide_controls">
            <button id="slideControlsPrev" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#CFFFE2" stroke="currentColor" stroke-width="1" width="48">
                    <polyline points="18 15 12 9 6 15"/>
                </svg>
            </button>
            <button id="slideControlsNext" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#CFFFE2" stroke="currentColor" stroke-width="1" width="48">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>
        <div class="slide_index">
            <span id="slideIndexCurrent"></span>
            /
            <span id="slideIndexTotal"></span>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="./resources/js/custom.js"></script>
</body>
</html>
